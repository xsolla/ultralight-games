<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xsolla Crowd Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #08080f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-root {
      position: relative;
      width: 800px;
      height: 600px;
      flex: none;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 800px;
      height: 600px;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 8, 15, 0.72);
      backdrop-filter: blur(2px);
      z-index: 10;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .modal-overlay[hidden] { display: none; }
    .modal {
      width: min(90%, 380px);
      background: linear-gradient(160deg, #1a1a2e 0%, #12121f 100%);
      border: 1px solid #2a2a44;
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
      padding: 26px 26px 22px;
      color: #dde0f0;
      text-align: center;
      animation: modalPop 180ms ease-out;
    }
    @keyframes modalPop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal h2 {
      margin-bottom: 18px;
      font-size: 26px;
      letter-spacing: 0.5px;
      color: #7ed8f0;
    }
    .modal ol {
      list-style: none;
      margin: 0 0 22px;
      padding: 0;
    }
    .modal li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 11px 14px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 9px;
      font-size: 19px;
    }
    .modal li .rank  { color: #94a3b8; font-weight: 700; margin-right: 10px; }
    .modal li .score { font-weight: 700; }
    .modal li.empty  { color: #5c5f78; font-style: italic; justify-content: center; }
    .modal li.new {
      background: rgba(126, 216, 240, 0.16);
      box-shadow: inset 0 0 0 1px rgba(126, 216, 240, 0.5);
    }
    .modal li.new .score { color: #7ed8f0; }
    .modal li .tag {
      font-size: 12px;
      color: #7ed8f0;
      margin-left: 8px;
      letter-spacing: 0.5px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
    }
    #playAgainBtn, .btn-secondary {
      flex: 1;
      padding: 13px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      border-radius: 9px;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    #playAgainBtn {
      color: #08080f;
      background: #7ed8f0;
      border: none;
    }
    #playAgainBtn:hover { background: #a4e6f6; }
    .btn-secondary {
      color: #7ed8f0;
      background: transparent;
      border: 1px solid #7ed8f0;
    }
    .btn-secondary:hover { background: rgba(126, 216, 240, 0.14); }

    .title-overlay { background: rgba(8, 8, 15, 0.55); backdrop-filter: none; }
    .title-box {
      width: min(90%, 420px);
      text-align: center;
      color: #dde0f0;
      background: rgba(8, 8, 15, 0.5);
      border-radius: 16px;
      padding: 30px 28px;
      animation: modalPop 220ms ease-out;
    }
    .title-box h1 {
      font-size: 48px;
      line-height: 1.05;
      letter-spacing: 0.5px;
      color: #7ed8f0;
      text-shadow: 0 2px 18px rgba(126, 216, 240, 0.35), 0 2px 4px rgba(0, 0, 0, 0.8);
      margin-bottom: 8px;
    }
    .title-hint {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 22px;
    }
    .title-box ol {
      list-style: none;
      margin: 0 0 24px;
      padding: 0;
    }
    .title-box li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 14px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 9px;
      font-size: 18px;
    }
    .title-box li .rank  { color: #94a3b8; font-weight: 700; margin-right: 10px; }
    .title-box li .score { font-weight: 700; }
    #playBtn {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      color: #08080f;
      background: #7ed8f0;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: background 120ms ease;
    }
    #playBtn:hover { background: #a4e6f6; }

    #soundBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #7ed8f0;
      background: rgba(8, 8, 15, 0.5);
      border: 1px solid #2a2a44;
      border-radius: 10px;
      cursor: pointer;
      z-index: 30;
      transition: background 120ms ease, border-color 120ms ease;
    }
    #soundBtn:hover { background: rgba(126, 216, 240, 0.14); border-color: #7ed8f0; }
    #soundBtn svg  { width: 24px; height: 24px; display: block; }

    #exitBtn {
      position: absolute;
      top: 12px;
      right: 64px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #f87171;
      background: rgba(8, 8, 15, 0.5);
      border: 1px solid #2a2a44;
      border-radius: 10px;
      cursor: pointer;
      z-index: 30;
      transition: background 120ms ease, border-color 120ms ease;
    }
    #exitBtn[hidden]  { display: none; }
    #exitBtn:hover    { background: rgba(248, 113, 113, 0.16); border-color: #f87171; }
    #exitBtn svg      { width: 24px; height: 24px; display: block; }
  </style>
</head>
<body>
  <div id="game-root">
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="leaderboardModal" class="modal-overlay" hidden>
    <div class="modal">
      <h2>&#x1F3C6; Top Runs</h2>
      <ol id="leaderboardList"></ol>
      <div class="modal-buttons">
        <button id="titleBtn" class="btn-secondary">Title Screen</button>
        <button id="playAgainBtn">Play Again</button>
      </div>
    </div>
  </div>

  <div id="titleScreen" class="modal-overlay title-overlay">
    <div class="title-box">
      <h1>Xsolla Crowd Run</h1>
      <p class="title-hint">Steer your crowd through the good gates!</p>
      <ol id="titleScores"></ol>
      <button id="playBtn">&#x25B6; Play</button>
    </div>
  </div>

  <button id="exitBtn" type="button" aria-label="Exit to title" title="Exit to title" hidden></button>
  <button id="soundBtn" type="button" aria-label="Sound"></button>
  </div><!-- /#game-root -->

  <script src="scale.js"></script>
  <script src="game.js"></script>
</body>
</html>
